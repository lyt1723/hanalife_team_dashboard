<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>하나생명 이정화 지점장 팀 관리 시스템</title>
    
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; color: #1e293b; }
        
        /* [1. 달력 레이아웃 및 버튼 복구] */
        #calendar { 
            background: white; padding: 20px; border-radius: 24px; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border: 1px solid #e2e8f0;
            min-height: 700px;
        }
        /* 버튼 클릭 가능하도록 보정 */
        .fc .fc-button { z-index: 10; cursor: pointer; }
        .fc-event { cursor: pointer !important; border: none !important; font-weight: 600 !important; }

        /* [2. 주말 및 공휴일 가시성] */
        .fc-day-sun .fc-daygrid-day-number { color: #ef4444 !important; }
        .fc-day-sat .fc-daygrid-day-number { color: #3b82f6 !important; }
        .holiday-bg { background-color: #fff1f2 !important; }

        /* [3. 매니저 카드 스타일] */
        .manager-card { 
            background: white; border: 2px solid transparent; border-radius: 16px; 
            padding: 18px; transition: all 0.2s ease; cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .manager-card:hover { transform: translateY(-3px); border-color: #10b981; }
        .active-filter { border-color: #10b981; background-color: #ecfdf5; }

        .modal-content { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-[1400px] mx-auto">
        <header class="flex flex-col gap-6 mb-10">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="p-3 bg-emerald-600 rounded-2xl shadow-lg">
                        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    </div>
                    <h1 class="text-3xl font-black text-slate-800 tracking-tight">하나생명 이정화 지점장 팀</h1>
                </div>
                <div id="filter-indicator" class="hidden bg-emerald-100 text-emerald-700 px-4 py-2 rounded-full font-bold animate-pulse">필터링 중</div>
            </div>
            
            <div id="manager-list" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-5"></div>
        </header>

        <div id="calendar"></div>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center z-[1000] p-4">
        <div class="bg-white p-8 rounded-[32px] shadow-2xl w-full max-w-md modal-content">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-2xl font-black text-slate-800" id="modal-title">일정 관리</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 text-3xl font-light">&times;</button>
            </div>
            
            <div class="space-y-6">
                <div>
                    <label class="block text-xs font-black text-slate-400 mb-2 uppercase">날짜</label>
                    <input type="date" id="selected-date" class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl font-bold outline-none focus:border-emerald-500">
                </div>
                <div>
                    <label class="block text-xs font-black text-slate-400 mb-2 uppercase">담당 매니저</label>
                    <select id="user-select" class="w-full border-2 border-slate-100 p-4 rounded-2xl font-bold outline-none focus:border-emerald-500 cursor-pointer"></select>
                </div>
                <div>
                    <label class="block text-xs font-black text-slate-400 mb-2 uppercase">근무 종류</label>
                    <select id="event-type" onchange="handleTypeChange(this.value)" class="w-full border-2 border-slate-100 p-4 rounded-2xl font-bold outline-none focus:border-emerald-500 cursor-pointer">
                        <option value="연차">연차 (-1일)</option>
                        <option value="여름휴가">여름휴가 (-1일)</option>
                        <option value="반차">반차 (-0.5일)</option>
                        <option value="외근">외근</option>
                    </select>
                </div>
                <div id="outside-detail" class="hidden bg-emerald-50 p-5 rounded-2xl border-2 border-emerald-100">
                    <label class="block text-sm font-bold text-emerald-700 mb-2">외근처</label>
                    <select id="outside-location" class="w-full bg-white border-none p-2 rounded-xl font-bold text-emerald-800 outline-none">
                        <option value="삼성금융파트너스">삼성금융파트너스</option>
                        <option value="아이에프에이">아이에프에이</option>
                        <option value="에이원금융판매">에이원금융판매</option>
                        <option value="키움에셋플래너">키움에셋플래너</option>
                        <option value="에이티에셋">에이티에셋</option>
                    </select>
                </div>
                <div class="flex gap-4 pt-4">
                    <button id="btn-delete" onclick="deleteEvent()" class="hidden flex-1 py-4 bg-rose-50 text-rose-600 rounded-2xl font-black">삭제</button>
                    <button onclick="saveEvent()" class="flex-1 py-4 bg-slate-800 text-white rounded-2xl font-black">저장</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const managers = ["이연택", "박승현", "강미현", "김용주", "정혜정", "강선경"];
        const POSITION = "설계매니저";
        const TOTAL_LEAVE = 15;
        
        let events = JSON.parse(localStorage.getItem('hana_pro_v1')) || [];
        let calendar;
        let activeFilter = null;
        let isEditMode = false;
        let selectedEventId = null;

        document.addEventListener('DOMContentLoaded', function() {
            renderDashboard();
            initUserSelect();

            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'ko',
                height: 'auto',
                headerToolbar: { 
                    left: 'prev,next today', 
                    center: 'title', 
                    right: 'dayGridMonth,dayGridWeek' 
                },
                dayMaxEvents: true,
                events: function(info, successCallback) {
                    let filtered = activeFilter ? events.filter(e => e.name === activeFilter) : events;
                    successCallback(filtered);
                },
                dateClick: (info) => openModal(info.dateStr),
                eventClick: (info) => openEditModal(info.event)
            });
            calendar.render();
        });

        function renderDashboard() {
            const listEl = document.getElementById('manager-list');
            listEl.innerHTML = '';
            managers.forEach(name => {
                const used = events.filter(e => e.name === name).reduce((acc, curr) => acc + (parseFloat(curr.deduction) || 0), 0);
                const isActive = activeFilter === name;
                const card = document.createElement('div');
                card.className = `manager-card ${isActive ? 'active-filter' : ''}`;
                card.onclick = () => toggleFilter(name);
                card.innerHTML = `
                    <div class="flex flex-col gap-1">
                        <span class="text-[13px] font-black text-emerald-600 uppercase mb-1">${POSITION}</span>
                        <span class="text-xl font-black text-slate-800">${name}</span>
                        <div class="mt-4 flex justify-between items-end">
                            <span class="text-[11px] text-slate-400 font-bold">잔여</span>
                            <span class="text-xl font-black ${TOTAL_LEAVE - used <= 2 ? 'text-rose-500' : 'text-slate-800'}">${TOTAL_LEAVE - used}일</span>
                        </div>
                    </div>
                `;
                listEl.appendChild(card);
            });
        }

        function toggleFilter(name) {
            activeFilter = (activeFilter === name) ? null : name;
            document.getElementById('filter-indicator').classList.toggle('hidden', !activeFilter);
            renderDashboard();
            calendar.refetchEvents();
        }

        function initUserSelect() {
            const select = document.getElementById('user-select');
            managers.forEach(name => {
                const opt = document.createElement('option');
                opt.value = name; opt.innerText = `${name} ${POSITION}`;
                select.appendChild(opt);
            });
        }

        function handleTypeChange(val) {
            document.getElementById('outside-detail').classList.toggle('hidden', val !== "외근");
        }

        function openModal(date) {
            isEditMode = false;
            document.getElementById('modal-title').innerText = "일정 등록";
            document.getElementById('selected-date').value = date;
            document.getElementById('btn-delete').classList.add('hidden');
            document.getElementById('modal').classList.remove('hidden');
        }

        function openEditModal(eventObj) {
            isEditMode = true;
            selectedEventId = eventObj.id;
            document.getElementById('modal-title').innerText = "일정 수정";
            document.getElementById('selected-date').value = eventObj.startStr;
            document.getElementById('user-select').value = eventObj.extendedProps.name;
            document.getElementById('event-type').value = eventObj.extendedProps.type;
            handleTypeChange(eventObj.extendedProps.type);
            if(eventObj.extendedProps.type === "외근") document.getElementById('outside-location').value = eventObj.extendedProps.location;
            document.getElementById('btn-delete').classList.remove('hidden');
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        function saveEvent() {
            const name = document.getElementById('user-select').value;
            const type = document.getElementById('event-type').value;
            const date = document.getElementById('selected-date').value;
            const loc = document.getElementById('outside-location').value;
            if(!date) return alert("날짜를 선택하세요.");

            let deduction = (type === "연차" || type === "여름휴가") ? 1 : (type === "반차" ? 0.5 : 0);
            const newEvent = {
                id: isEditMode ? selectedEventId : String(Date.now()),
                title: type === "외근" ? `${name}[${loc}]` : `${name}(${type})`,
                start: date,
                color: type === "외근" ? '#3b82f6' : (type === "여름휴가" ? '#f59e0b' : '#10b981'),
                name, type, deduction, location: type === "외근" ? loc : ""
            };

            if (isEditMode) events = events.filter(e => e.id !== selectedEventId);
            events.push(newEvent);
            localStorage.setItem('hana_pro_v1', JSON.stringify(events));
            calendar.refetchEvents();
            renderDashboard();
            closeModal();
        }

        function deleteEvent() {
            if(confirm("삭제하시겠습니까?")) {
                events = events.filter(e => e.id !== selectedEventId);
                localStorage.setItem('hana_pro_v1', JSON.stringify(events));
                calendar.refetchEvents();
                renderDashboard();
                closeModal();
            }
        }
    </script>
</body>
</html>
